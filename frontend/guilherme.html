<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Chaplin | ᕓ𐌄𐌁𐌋𐌀𐌍𐌂𐌄</title>
    <link rel="stylesheet" href="css/barbeiro.css">
</head>

<body>

    <header><img src="assets/logo.png" alt="aa"></header>

    <main class="BarbeiroPage">

        <div class="BarbeiroMenuStatus" id="guilhermeBox2">
            <img class="FotoPerfil" src="assets/guilherme.png" alt="gabriel img">
            <p class="NomeBarbeiro">Guilherme</p>
            <p class="Legenda">🔴: Indisponivel <br>🟠: Atendendo <br>🟣: Intervalo (Refeição)</p>
            <button class="MudarStatusProfissional"><img src="assets/icons8-desligar-50.png" alt="">
                <div class="text1212"> Ficar Indisponivel</div>
            </button>

            <button class="MudarStatusProfissionalDisponivel Hidden"><img src="assets/icons8-shutdown-50.png" alt="">
                <div class="text1212"> Ficar Disponivel</div>
            </button>

            <button class="StatusRefeicaoBarbeiroBTN"><img src="assets/icons8-chocolate-quente-64.png" alt="">Intervalo (Refeiçao)</button>



        </div>


        <div class="FilaMainBox">

            <h5><img src="assets/icons8-fila-100.png" alt="">
                <div class="text1212">Fila</div>
            </h5>

            <p class="Legenda">
                🟠:Atendendo
            </p>

            <div class="FilaBox">

                <div class="Fila" id="filaBarbeiro">

                    <h6 id="textoApagavel">Sem Clientes Na Fia</h6>


                    <div class="ClienteCardBox">

                        <div class="ClienteNome">
                            <div class="BoxIMG"><img src="assets/icons8-usuário-24.png" alt="user png"></div>
                            <div class="text1212">Gustavo</div>
                        </div>

                        <div class="ServicoCliente"><span id="servicocliente">Corte + barba</span><span
                                id="profissionalEscolhido">Pedro</span> <span class="TimeBoxCliente"><span
                                    class="CloackClienteIMG"><img src="assets/icons8-clock-250.png" alt=""><span
                                        class="text1212" id="tempoCliente">30 min</span></span></span> </div>

                        <div class="BtnClienteGerenciamento">

                            <a id="LinkNumberCliente" href=""><img
                                    src="assets/logo-whatsapp-branco-png-icone-whatsapp-png-branco-11562849301ohgxjt9m7x-removebg-preview.png"
                                    alt="ue">Menssagem</a>

                            <button class="ChamarFinalizarCliente">Atender</button>
                            <button class="FinalizarCliente Hidden">Finalizar</button>

                        </div>

                    </div>


                </div>

            </div>


            <div class="BTNQRCODELINKBOX">

                <button class="BTNQrCode">
                    Ver Qr code
                </button>

                <button class="BTNCopiarLink">
                    Copiar Link
                </button>
            </div>



            <div class="QrCodeBox" id="hidden">

                <h5>Leia o Qr Code</h5>


                <img src="assets/Qr Code Link Barbearia.png" alt="qr code">

                <button class="EsconderBTNLinks" id="fecharQrCodeBox">Esconder</button>

            </div>


            <div class="CopiarLinkBox" id="hidden">

                <h5>Copie o Link Desejado</h5>

                <div class="links">
                    <h6>Link da Barbearia</h6>
                    <button class="CopiarBarbeariaBTN" id="linkBarbeariaBTN">Copiar</button>
                </div>

                <div class="links">
                    <h6>Link Pessoal</h6>
                    <button class="CopiarBarbeariaBTN" id="linkPessoalBTN">Copiar</button>
                </div>
                <button class="EsconderBTNLinks" id="fecharLinksBox">Esconder</button>
            </div>


        </div>

    </main>

    <footer>

        <h6>@2026 Todos os Direitos Reservados á Chapin Barbearia</h6>
        <p>ᕓ𐌄𐌁𐌋𐌀𐌍𐌂𐌄</p>

    </footer>

    <div class="container-botoes">

        <button id="btn-atualizar" class="botao-flutuante principal">
            🔄 <span class="texto-botao">Atualizar Fila</span>
        </button>
    </div>

    <script src="js/barbeiro.js"></script>
    <script src="js/funcionarios.js"></script>

</body>

</html>
